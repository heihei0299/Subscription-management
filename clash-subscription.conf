# Clash Subscription Updater — Configuration
#
# Copy this file to /etc/clash-subscription/clash-subscription.conf (or any path)
# and fill in your subscription URL.
#
# Usage:  update-clash-config.sh -c /path/to/this/file

# REQUIRED: Your Clash subscription URL
SUBSCRIPTION_URL=""

# Directory where config.yaml will be saved
OUTPUT_DIR="/etc/clash"

# User-Agent string for curl (UA spoofing)
USER_AGENT="ClashForAndroid/3.0.8"

# Log file path
LOG_FILE="/var/log/clash-subscription.log"

# --- Retry & timeout ---

# Max curl retry attempts
RETRY=3

# Retry interval in seconds
RETRY_DELAY=5

# curl connect timeout in seconds
TIMEOUT=15

# --- Daemon mode ---

# Polling interval in seconds (default: 21600 = 6 hours)
INTERVAL=21600
